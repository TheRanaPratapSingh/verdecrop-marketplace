name: Build & Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend-deploy.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:   'backend/VerdeCrop.API/VerdeCrop.API.csproj'
  PUBLISH_DIR:    'publish-output'

jobs:

  build:
    name: Build and Publish (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build Release
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 1

  deploy:
    name: Deploy to Azure App Service Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://graamo-cwb0f0g8hdbghkbq.centralindia-01.azurewebsites.net
    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name:        ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package:         ${{ env.PUBLISH_DIR }}
