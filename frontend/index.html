<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default SEO (overridden per-page by react-helmet-async) -->
    <title>Graamo – Organic Marketplace</title>
    <meta name="description" content="Buy 100% certified organic vegetables, fruits &amp; grains directly from 50+ trusted Indian farmers. No chemicals, no middlemen – farm fresh to your door." />
    <link rel="canonical" href="https://graamo.in/" />

    <!-- Open Graph defaults -->
    <meta property="og:site_name"    content="Graamo" />
    <meta property="og:type"         content="website" />
    <meta property="og:title"        content="Graamo – Organic Marketplace" />
    <meta property="og:description"  content="Buy 100% certified organic vegetables, fruits &amp; grains directly from 50+ trusted Indian farmers. No chemicals, no middlemen – farm fresh to your door." />
    <meta property="og:url"          content="https://graamo.in/" />
    <meta property="og:image"        content="https://graamo.in/og-default.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"       content="en_IN" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@GraamoIndia" />
    <meta name="twitter:title"       content="Graamo – Organic Marketplace" />
    <meta name="twitter:description" content="Buy 100% certified organic vegetables, fruits &amp; grains directly from 50+ trusted Indian farmers." />
    <meta name="twitter:image"       content="https://graamo.in/og-default.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />

    <!-- Font preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
